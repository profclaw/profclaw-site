<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="500" viewBox="0 0 1500 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%" stop-color="#0f0a1a"/>
      <stop offset="100%" stop-color="#050408"/>
    </linearGradient>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fb7185"/>
      <stop offset="100%" stop-color="#e11d48"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#f43f5e" stop-opacity=".06"/>
      <stop offset="100%" stop-color="#f43f5e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="profGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fb7185"/>
      <stop offset="60%" stop-color="#f43f5e"/>
      <stop offset="100%" stop-color="#e11d48"/>
    </linearGradient>
  </defs>
  <rect width="1500" height="500" fill="url(#bg)"/>
  <rect width="1500" height="500" fill="url(#glow)"/>
  <!-- Mascot left -->
  <g transform="translate(360,80) scale(2.0)">
    <ellipse cx="50" cy="54" rx="24" ry="22" fill="url(#body)"/>
    <ellipse cx="48" cy="49" rx="13" ry="9" fill="#fda4af" opacity=".15"/>
    <rect x="39" y="73" width="8" height="10" rx="4" fill="#be123c"/>
    <rect x="53" y="73" width="8" height="10" rx="4" fill="#be123c"/>
    <ellipse cx="20" cy="54" rx="8" ry="6" fill="#be123c"/>
    <path d="M15,49 L20,54 L25,49" stroke="#4c0519" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <ellipse cx="80" cy="54" rx="8" ry="6" fill="#be123c"/>
    <path d="M75,49 L80,54 L85,49" stroke="#4c0519" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <line x1="39" y1="34" x2="31" y2="20" stroke="#be123c" stroke-width="2.2" stroke-linecap="round"/>
    <circle cx="30" cy="18" r="3.5" fill="#fda4af"/>
    <line x1="61" y1="34" x2="69" y2="20" stroke="#be123c" stroke-width="2.2" stroke-linecap="round"/>
    <circle cx="70" cy="18" r="3.5" fill="#fda4af"/>
    <circle cx="43" cy="51" r="6.5" fill="#fff"/>
    <circle cx="57" cy="51" r="6.5" fill="#fff"/>
    <circle cx="44.5" cy="50" r="3.5" fill="#4c0519"/>
    <circle cx="58.5" cy="50" r="3.5" fill="#4c0519"/>
    <circle cx="46" cy="48.5" r="1.4" fill="#fff"/>
    <circle cx="60" cy="48.5" r="1.4" fill="#fff"/>
    <path d="M45,63 Q50,68 57,62" stroke="#9f1239" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>
  <!-- Text right of mascot -->
  <text x="620" y="240" font-family="'Helvetica Neue', -apple-system, system-ui, sans-serif" font-weight="800" font-size="72" letter-spacing="-3">
    <tspan fill="url(#profGrad)">prof</tspan><tspan fill="#ffffff">Claw</tspan>
  </text>
  <text x="624" y="290" font-family="'Helvetica Neue', -apple-system, system-ui, sans-serif" font-weight="400" font-size="24" fill="#8892b0" letter-spacing="0.5">
    AI Agent Engine - Self-Hosted
  </text>
  <!-- Feature pills -->
  <g font-family="'Helvetica Neue', -apple-system, system-ui, sans-serif" font-weight="500" font-size="15">
    <rect x="620" y="320" width="130" height="32" rx="16" fill="none" stroke="#f43f5e" stroke-opacity=".3"/>
    <text x="685" y="341" text-anchor="middle" fill="#fb7185">37 Providers</text>
    <rect x="765" y="320" width="140" height="32" rx="16" fill="none" stroke="#f43f5e" stroke-opacity=".3"/>
    <text x="835" y="341" text-anchor="middle" fill="#fb7185">27 Channels</text>
    <rect x="920" y="320" width="110" height="32" rx="16" fill="none" stroke="#f43f5e" stroke-opacity=".3"/>
    <text x="975" y="341" text-anchor="middle" fill="#fb7185">77+ Tools</text>
  </g>
